databases:
  - name: eomail-db
    plan: free
    databaseName: eomail
    user: eomail

services:
  - type: web
    name: eomail
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm run db:push
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: eomail-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: DOMAIN
        value: eomail.co
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
