services:
  - type: web
    name: eomail
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build && npm run db:push
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DOMAIN
        value: eomail.co
      - key: NEXT_PUBLIC_APP_URL
        value: https://eomail.co
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
